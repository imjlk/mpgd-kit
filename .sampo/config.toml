[git]
default_branch = "main"

[github]
repository = "imjlk/mpgd-kit"

[changesets]
tags = ["Added", "Changed", "Deprecated", "Removed", "Fixed", "Security"]

[changelog]
show_commit_hash = true
show_acknowledgments = true
show_release_date = true
release_date_timezone = "Asia/Seoul"

[packages]
ignore_unpublished = true
fixed = [
  [
    "npm/@mpgd/cli",
    "npm/@mpgd/create-game",
  ],
]
# Explicitly register the independently versioned Verse8 adapter without
# fixed-group dependency bumps changing its requested SemVer level.
linked = [["npm/@mpgd/adapter-verse8"]]
