"$schema" = "../../node_modules/wrangler/config-schema.json"
name = "mpgd-game-services"
main = "src/index.ts"
compatibility_date = "2026-07-04"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
MPGD_STORE = "memory"

[observability]
enabled = true
head_sampling_rate = 1

# For production persistence, create a D1 database and uncomment this binding.
# Then set MPGD_STORE = "d1" and apply every SQL file in migrations/ in order.
#
# [[d1_databases]]
# binding = "DB"
# database_name = "mpgd-game-services"
# database_id = "<replace-with-wrangler-d1-create-output>"

# Bind a private identity Worker to enable authenticated public snapshot reads.
# The service must implement authenticateVerifiedLeaderboardSnapshot({ authorization }).
#
# [[services]]
# binding = "VERIFIED_LEADERBOARD_AUTH"
# service = "game-identity"

# Bind either one aggregate evidence verifier Worker or one verifier per
# production target. If any target-specific binding is configured, configure
# every target served by this deployment; missing targets fail closed and do
# not fall back to the aggregate binding.
#
# [[services]]
# binding = "GAME_SERVICES_EVIDENCE_VERIFIER"
# service = "game-evidence-verifier"
#
# [[services]]
# binding = "GAME_SERVICES_ANDROID_EVIDENCE_VERIFIER"
# service = "game-evidence-verifier-android"
#
# [[services]]
# binding = "GAME_SERVICES_IOS_EVIDENCE_VERIFIER"
# service = "game-evidence-verifier-ios"
#
# [[services]]
# binding = "GAME_SERVICES_AIT_EVIDENCE_VERIFIER"
# service = "game-evidence-verifier-ait"
