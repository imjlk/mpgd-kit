packages:
  - 'apps/*'
  - 'packages/*'
  - 'adapters/*'
  - 'native-plugins/*'
  - 'backend/*'
  - 'examples/*'
allowBuilds:
  '@sentry/cli': true
  '@swc/core': true
  # @ait-co/devtools lazily installs cloudflared when the phone tunnel starts;
  # keep default workspace installs free of external binary downloads.
  cloudflared: false
  esbuild: true
  protobufjs: true
  sharp: true
  workerd: true
minimumReleaseAgeExclude:
  - '@ttsc/darwin-arm64@0.18.4'
  - '@ttsc/darwin-x64@0.18.4'
  - '@ttsc/graph@0.18.4'
  - '@ttsc/lint@0.18.4'
  - '@ttsc/linux-arm64@0.18.4'
  - '@ttsc/linux-arm@0.18.4'
  - '@ttsc/linux-x64@0.18.4'
  - '@ttsc/paths@0.18.4'
  - '@ttsc/strip@0.18.4'
  - '@ttsc/unplugin@0.18.4'
  - '@ttsc/win32-arm64@0.18.4'
  - '@ttsc/win32-x64@0.18.4'
  - '@typia/interface@13.0.2'
  - '@typia/mcp@13.0.2'
  - '@typia/utils@13.0.2'
  - ttsc@0.18.4
  - typia@13.0.2
  - '@orpc/client@2.0.0-beta.14'
  - '@orpc/contract@2.0.0-beta.14'
  - '@orpc/interop@2.0.0-beta.14'
  - '@orpc/server@2.0.0-beta.14'
  - '@orpc/shared@2.0.0-beta.14'
  - '@devvit/build-pack@0.13.8'
  - '@devvit/builders@0.13.8'
  - '@devvit/cache@0.13.8'
  - '@devvit/cli@0.13.8'
  - '@devvit/client@0.13.8'
  - '@devvit/external-endpoints@0.13.8'
  - '@devvit/linkers@0.13.8'
  - '@devvit/media@0.13.8'
  - '@devvit/notifications@0.13.8'
  - '@devvit/payments@0.13.8'
  - '@devvit/protos@0.13.8'
  - '@devvit/public-api@0.13.8'
  - '@devvit/realtime@0.13.8'
  - '@devvit/reddit@0.13.8'
  - '@devvit/redis@0.13.8'
  - '@devvit/scheduler@0.13.8'
  - '@devvit/server@0.13.8'
  - '@devvit/settings@0.13.8'
  - '@devvit/shared-types@0.13.8'
  - '@devvit/shared@0.13.8'
  - '@devvit/start@0.13.8'
  - '@devvit/web-view-scripts@0.13.8'
  - '@devvit/web@0.13.8'
  - devvit@0.13.8
  - '@ait-co/devtools@0.1.140'
