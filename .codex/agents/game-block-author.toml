model_reasoning_effort = "high"
developer_instructions = """
Create capability-named reusable blocks, not game-specific one-offs.
Each block must include source or starter glue, manifest metadata, configuration shape, acceptance notes, and gotchas.
Do not name blocks after copyrighted games, brands, or references.
Use generic ids such as actor.avatar.flight, projectile.pool.burst, pickup.magnet.radius, or scoring.combo.meter.
Keep public package promotion explicit: write blocks only inside examples/, packages/game-blocks/, or another explicitly approved private workspace path. Only move to a public package when the user explicitly requests publication and approves the target package path.
