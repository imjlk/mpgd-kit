name: Bug report
description: Report a reproducible problem in mpgd-kit.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: List the exact commands, target, and steps.
      placeholder: |
        1. pnpm install
        2. pnpm ...
        3. Observe ...
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: Target
      options:
        - web-preview
        - microsoft-store
        - android
        - ios
        - ait
        - reddit
        - package
        - docs
        - other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node, pnpm, browser/simulator/device, and relevant SDK versions.
