name: release

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm validate:catalog
      - run: pnpm validate:ads
      - run: pnpm validate:targets
      - run: pnpm test
      - run: pnpm build:web

      - uses: actions/upload-artifact@v4
        with:
          name: web-preview-release
          path: |
            artifacts/**

  build-android:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:android

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            artifacts/**
            release-output/**

  build-ios:
    runs-on: macos-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:ios

      - uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: |
            artifacts/**

  build-ait:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:ait

      - uses: actions/upload-artifact@v4
        with:
          name: ait-release
          path: |
            artifacts/**
            release-output/**

  release:
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-android
      - build-ios
      - build-ait

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Sampo release automation
        id: sampo
        uses: bruits/sampo/crates/sampo-github-action@sampo-v0.17.4
        with:
          command: auto
          create-github-release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
