name: release

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      # Build package dist and smoke npm tarballs only. Target builds run in PR CI.
      - run: pnpm pack:packages

      - name: Run Sampo release automation
        id: sampo
        uses: bruits/sampo/crates/sampo-github-action@sampo-v0.17.4
        with:
          command: auto
          create-github-release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Queue release PR validation
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_pr="$(
            gh pr list \
              --repo "${GITHUB_REPOSITORY}" \
              --head release/main \
              --state open \
              --json number \
              --jq '.[0].number // empty'
          )"
          if [ -n "${release_pr}" ]; then
            gh workflow run ci.yml --ref release/main --field release_pr_metadata_only=true
          else
            echo "No open release/main PR found; skipping release PR validation dispatch."
          fi
