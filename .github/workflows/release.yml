name: release

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm validate:catalog
      - run: pnpm validate:ads
      - run: pnpm validate:target-config
      - run: pnpm validate:effective-config
      - run: pnpm validate:targets
      - run: pnpm test
      - run: tar -czf package-dist.tgz packages/*/dist adapters/*/dist backend/*/dist native-plugins/*/dist
      - uses: actions/upload-artifact@v6
        with:
          name: package-dist-release
          path: package-dist.tgz
      - run: pnpm graph:preflight
      - run: pnpm pack:packages:prepared
      - run: pnpm build:web
        env:
          MPGD_SKIP_BUILD_TARGET_PREFLIGHT: '1'
      - run: pnpm smoke:target web-preview

      - uses: actions/upload-artifact@v6
        with:
          name: web-preview-release
          path: |
            artifacts/**

  build-android:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v4

      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: package-dist-release
      - run: tar -xzf package-dist.tgz
      - run: pnpm build:android
        env:
          MPGD_SKIP_BUILD_TARGET_PREFLIGHT: '1'
      - run: pnpm smoke:target android

      - uses: actions/upload-artifact@v6
        with:
          name: android-release
          path: |
            artifacts/**
            release-output/**

  build-ios:
    runs-on: macos-26
    needs: validate

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: package-dist-release
      - run: tar -xzf package-dist.tgz
      - run: pnpm build:ios
        env:
          MPGD_SKIP_BUILD_TARGET_PREFLIGHT: '1'
      - run: pnpm smoke:target ios

      - uses: actions/upload-artifact@v6
        with:
          name: ios-release
          path: |
            artifacts/**

  build-ait:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: package-dist-release
      - run: tar -xzf package-dist.tgz
      - run: pnpm build:ait
        env:
          MPGD_SKIP_BUILD_TARGET_PREFLIGHT: '1'
      - run: pnpm smoke:target ait

      - uses: actions/upload-artifact@v6
        with:
          name: ait-release
          path: |
            artifacts/**
            release-output/**

  build-devvit:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: package-dist-release
      - run: tar -xzf package-dist.tgz
      - run: pnpm build:devvit
        env:
          MPGD_SKIP_BUILD_TARGET_PREFLIGHT: '1'
      - run: pnpm smoke:target reddit

      - uses: actions/upload-artifact@v6
        with:
          name: devvit-release
          path: |
            artifacts/**
            apps/target-devvit/dist/**

  release:
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-android
      - build-ios
      - build-ait
      - build-devvit

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm pack:packages

      - name: Run Sampo release automation
        id: sampo
        uses: bruits/sampo/crates/sampo-github-action@sampo-v0.17.4
        with:
          command: auto
          create-github-release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
