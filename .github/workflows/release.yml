name: release

on:
  workflow_run:
    workflows:
      - ci
    branches:
      - main
    types:
      - completed
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ github.event.workflow_run.head_branch || 'main' }}

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm pack:packages

      - name: Run Sampo release automation
        id: sampo
        uses: bruits/sampo/crates/sampo-github-action@sampo-v0.17.4
        with:
          command: auto
          create-github-release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
