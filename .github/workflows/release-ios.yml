name: release-ios

on:
  workflow_dispatch:
    inputs:
      profile:
        type: choice
        required: true
        default: production
        options:
          - staging
          - production
      archive:
        type: boolean
        required: true
        default: false

jobs:
  build:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm validate:public
      - run: pnpm smoke:target-config
      - run: pnpm smoke:effective-config
      - run: pnpm smoke:adapter-effective-config
      - run: pnpm build:target ios ${{ inputs.profile }}
        env:
          MPGD_RUN_IOS_ARCHIVE: ${{ inputs.archive && '1' || '0' }}
      - run: pnpm smoke:target ios

      - uses: actions/upload-artifact@v6
        with:
          name: ios-${{ inputs.profile }}
          path: |
            examples/phaser-starter/artifacts/**
            examples/phaser-starter/release-output/**
