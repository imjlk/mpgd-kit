name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm validate:catalog
      - run: pnpm validate:ads
      - run: pnpm validate:policy
      - run: pnpm validate:targets
      - run: pnpm test
      - run: pnpm graph:preflight
      - run: pnpm pack:packages
      - run: pnpm build:web
      - run: pnpm smoke:targets

      - uses: actions/upload-artifact@v4
        with:
          name: web-preview-ci
          path: |
            artifacts/**

  build-android:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:android

      - uses: actions/upload-artifact@v4
        with:
          name: android-ci
          path: |
            artifacts/**
            release-output/**

  build-ios:
    runs-on: macos-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:ios

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ci
          path: |
            artifacts/**

  build-ait:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:ait

      - uses: actions/upload-artifact@v4
        with:
          name: ait-ci
          path: |
            artifacts/**
            release-output/**
