name: ci

on:
  pull_request:
  workflow_dispatch:
    inputs:
      release_pr_metadata_only:
        description: Run the lightweight release PR metadata validation path.
        required: false
        default: false
        type: boolean

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      release_pr_metadata_only: ${{ steps.release-pr-meta.outputs.enabled }}
    env:
      IS_RELEASE_PR: ${{ (github.event_name == 'pull_request' && startsWith(github.head_ref, 'release/')) || (github.event_name == 'workflow_dispatch' && inputs.release_pr_metadata_only) }}

    steps:
      - id: release-pr-meta
        run: echo "enabled=${IS_RELEASE_PR}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate release PR package metadata
        if: ${{ env.IS_RELEASE_PR == 'true' }}
        run: pnpm validate:public && pnpm pack:packages

      - run: pnpm check
        if: ${{ env.IS_RELEASE_PR != 'true' }}
      - run: pnpm validate:catalog
        if: ${{ env.IS_RELEASE_PR != 'true' }}
      - run: pnpm validate:ads
        if: ${{ env.IS_RELEASE_PR != 'true' }}
      - run: pnpm validate:target-config
        if: ${{ env.IS_RELEASE_PR != 'true' }}
      - run: pnpm validate:effective-config
        if: ${{ env.IS_RELEASE_PR != 'true' }}
      - run: pnpm validate:targets
        if: ${{ env.IS_RELEASE_PR != 'true' }}
      - run: pnpm test
        if: ${{ env.IS_RELEASE_PR != 'true' }}
      - run: tar -czf package-dist.tgz packages/*/dist adapters/*/dist backend/*/dist native-plugins/*/dist
        if: ${{ env.IS_RELEASE_PR != 'true' }}
      - uses: actions/upload-artifact@v6
        if: ${{ env.IS_RELEASE_PR != 'true' }}
        with:
          name: package-dist-ci
          path: package-dist.tgz
      - run: pnpm graph:preflight
        if: ${{ env.IS_RELEASE_PR != 'true' }}
      - run: pnpm pack:packages:prepared
        if: ${{ env.IS_RELEASE_PR != 'true' }}
      - run: pnpm build:web
        if: ${{ env.IS_RELEASE_PR != 'true' }}
        env:
          MPGD_SKIP_BUILD_TARGET_PREFLIGHT: '1'
      - run: pnpm smoke:target web-preview
        if: ${{ env.IS_RELEASE_PR != 'true' }}
      - run: pnpm build:microsoft-store
        if: ${{ env.IS_RELEASE_PR != 'true' }}
        env:
          MPGD_SKIP_BUILD_TARGET_PREFLIGHT: '1'
      - run: pnpm smoke:target microsoft-store
        if: ${{ env.IS_RELEASE_PR != 'true' }}

      - uses: actions/upload-artifact@v6
        if: ${{ env.IS_RELEASE_PR != 'true' }}
        with:
          name: web-preview-and-microsoft-store-ci
          path: |
            examples/phaser-starter/artifacts/**

  build-android:
    if: ${{ needs.validate.outputs.release_pr_metadata_only != 'true' }}
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v4

      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: package-dist-ci
      - run: tar -xzf package-dist.tgz
      - run: pnpm build:android
        env:
          MPGD_SKIP_BUILD_TARGET_PREFLIGHT: '1'
      - run: pnpm smoke:target android

      - uses: actions/upload-artifact@v6
        with:
          name: android-ci
          path: |
            examples/phaser-starter/artifacts/**
            examples/phaser-starter/release-output/**

  build-ios:
    if: ${{ needs.validate.outputs.release_pr_metadata_only != 'true' }}
    runs-on: macos-26
    needs: validate

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: package-dist-ci
      - run: tar -xzf package-dist.tgz
      - run: pnpm build:ios
        env:
          MPGD_SKIP_BUILD_TARGET_PREFLIGHT: '1'
      - run: pnpm smoke:target ios

      - uses: actions/upload-artifact@v6
        with:
          name: ios-ci
          path: |
            examples/phaser-starter/artifacts/**

  build-ait:
    if: ${{ needs.validate.outputs.release_pr_metadata_only != 'true' }}
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: package-dist-ci
      - run: tar -xzf package-dist.tgz
      - run: pnpm build:ait
        env:
          MPGD_SKIP_BUILD_TARGET_PREFLIGHT: '1'
      - run: pnpm smoke:target ait

      - uses: actions/upload-artifact@v6
        with:
          name: ait-ci
          path: |
            examples/phaser-starter/artifacts/**
            examples/phaser-starter/release-output/**

  build-devvit:
    if: ${{ needs.validate.outputs.release_pr_metadata_only != 'true' }}
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: package-dist-ci
      - run: tar -xzf package-dist.tgz
      - run: pnpm build:devvit
        env:
          MPGD_SKIP_BUILD_TARGET_PREFLIGHT: '1'
      - run: pnpm smoke:target reddit

      - uses: actions/upload-artifact@v6
        with:
          name: devvit-ci
          path: |
            examples/phaser-starter/artifacts/**
            apps/target-devvit/dist/**
