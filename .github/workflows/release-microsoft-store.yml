name: release-microsoft-store

on:
  workflow_dispatch:
    inputs:
      profile:
        type: choice
        required: true
        default: production
        options:
          - staging
          - production

permissions:
  contents: read

concurrency:
  group: release-microsoft-store-${{ inputs.profile }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm validate:public
      - run: pnpm check
      - run: pnpm validate:catalog
      - run: pnpm validate:ads
      - run: pnpm validate:target-config
      - run: pnpm validate:effective-config
      - run: pnpm validate:targets
      - run: pnpm smoke:target-config
      - run: pnpm smoke:effective-config
      - run: pnpm smoke:adapter-effective-config
      - run: pnpm smoke:game-services
      - run: pnpm build:target microsoft-store "${PROFILE}"
        env:
          PROFILE: ${{ inputs.profile }}
      - run: pnpm smoke:target microsoft-store

      - uses: actions/upload-artifact@v6
        with:
          name: microsoft-store-${{ inputs.profile }}
          path: |
            examples/phaser-starter/artifacts/**
