name: release-ait

on:
  workflow_dispatch:
    inputs:
      profile:
        type: choice
        required: true
        default: production
        options:
          - staging
          - production

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm validate:public
      - run: pnpm validate:target-config
      - run: pnpm validate:effective-config
      - run: pnpm validate:targets
      - run: pnpm smoke:target-config
      - run: pnpm smoke:effective-config
      - run: pnpm smoke:adapter-effective-config
      - run: pnpm build:target ait ${{ inputs.profile }}
      - run: pnpm smoke:target ait

      - uses: actions/upload-artifact@v6
        with:
          name: ait-${{ inputs.profile }}
          path: |
            examples/phaser-starter/artifacts/**
            examples/phaser-starter/release-output/**
