name: release-ait

on:
  workflow_dispatch:
    inputs:
      profile:
        type: choice
        required: true
        default: production
        options:
          - staging
          - production

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:target ait ${{ inputs.profile }}

      - uses: actions/upload-artifact@v4
        with:
          name: ait-${{ inputs.profile }}
          path: |
            artifacts/**
            release-output/**
