name: build-target

on:
  workflow_dispatch:
    inputs:
      target:
        type: choice
        required: true
        options:
          - web-preview
          - android
          - ios
          - ait
      profile:
        type: choice
        required: true
        options:
          - staging
          - production

jobs:
  build:
    runs-on: ${{ inputs.target == 'ios' && 'macos-latest' || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm validate:catalog
      - run: pnpm validate:ads
      - run: pnpm validate:targets
      - run: pnpm build:target ${{ inputs.target }} ${{ inputs.profile }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.target }}-${{ inputs.profile }}
          path: |
            artifacts/**
            release-output/**
