name: build-target

on:
  workflow_dispatch:
    inputs:
      target:
        type: choice
        required: true
        options:
          - web-preview
          - android
          - ios
          - ait
          - reddit
      profile:
        type: choice
        required: true
        options:
          - staging
          - production

jobs:
  build:
    runs-on: ${{ inputs.target == 'ios' && 'macos-26' || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - if: inputs.target == 'android'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - if: inputs.target == 'android'
        uses: android-actions/setup-android@v4

      - if: inputs.target == 'android'
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - run: pnpm install --frozen-lockfile
      - run: pnpm validate:public
      - run: pnpm check
      - run: pnpm validate:catalog
      - run: pnpm validate:ads
      - run: pnpm validate:target-config
      - run: pnpm validate:effective-config
      - run: pnpm validate:targets
      - run: pnpm validate:game-assets
      - run: pnpm smoke:target-config
      - run: pnpm smoke:effective-config
      - run: pnpm smoke:adapter-effective-config
      - run: pnpm smoke:game-services
      - run: pnpm build:target ${{ inputs.target }} ${{ inputs.profile }}
      - run: pnpm smoke:target ${{ inputs.target }}

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.target }}-${{ inputs.profile }}
          path: |
            artifacts/**
            release-output/**
            apps/target-devvit/dist/**
